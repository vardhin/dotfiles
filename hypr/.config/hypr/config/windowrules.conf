# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hyprland.org/Configuring/Window-Rules/ #

# Float Necessary Windows
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float on, match:class ^()$, match:title ^(Picture in picture)$
windowrule = float on, match:class ^()$, match:title ^(Save File)$
windowrule = float on, match:class ^()$, match:title ^(Open File)$
windowrule = float on, match:class ^(LibreWolf)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
windowrule = float on, match:class ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$
windowrule = float on, match:class ^(CachyOSHello)$
windowrule = float on, match:class ^(zenity)$
windowrule = float on, match:class ^()$, match:title ^(Steam - Self Updater)$
# Increase the opacity
windowrule = opacity 0.92, match:class ^(thunar|nemo)$
windowrule = opacity 0.96, match:class ^(discord|armcord|webcord)$
windowrule = opacity 0.95, match:title ^(QQ|Telegram)$
windowrule = opacity 0.95, match:title ^(NetEase Cloud Music Gtk4)$
# General window rules
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = size 960 540, match:title ^(Picture-in-Picture)$
windowrule = move 25%-, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrule = move 25%-, match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrule = size 960 540, match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrule = pin on, match:title ^(danmufloat)$
windowrule = rounding 5, match:title ^(danmufloat|termfloat)$
windowrule = animation slide right, match:class ^(kitty|Alacritty)$
# Firefox frosted-glass effect (native + Flatpak)
windowrule = opacity 0.92 override 0.92 override, match:class ^(firefox|org.mozilla.firefox)$
windowrule = float on, match:class ^(yad)$

windowrule = float on, match:class ^(xfce4-appfinder)$
windowrule = size 550 400, match:class ^(xfce4-appfinder)$

# Decorations related to floating windows on workspaces 1 to 10
windowrule = border_size 2, match:float 1, match:workspace w[fv1-10]
windowrule = border_color $cachylblue, match:float 1, match:workspace w[fv1-10]
windowrule = rounding 8, match:float 1, match:workspace w[fv1-10]
# Decorations related to tiling windows on workspaces 1 to 10
windowrule = border_size 3, match:float 0, match:workspace f[1-10]
windowrule = rounding 4, match:float 0, match:workspace f[1-10]
# Windows Rules End #

# Workspaces Rules https://wiki.hyprland.org/Configuring/Workspace-Rules/ #
# workspace = 1, default:true, monitor:$priMon
# workspace = 6, default:true, monitor:$secMon
# Workspace selectors https://wiki.hyprland.org/Configuring/Workspace-Rules/#workspace-selectors
# workspace = r[1-5], monitor:$priMon
# workspace = r[6-10], monitor:$secMon
# workspace = special:scratchpad, on-created-empty:$applauncher
# no_gaps_when_only deprecated instead workspaces rules with selectors can do the same
# Smart gaps https://wiki.hyprland.org/Configuring/Workspace-Rules/#smart-gaps
workspace = w[tv1-10], gapsout:5, gapsin:3
workspace = f[1], gapsout:5, gapsin:3
# Workspaces Rules End #

# Layers Rules #
# AGS layer rules
layerrule = blur on, match:namespace ags-bar
layerrule = blur on, match:namespace ags-notification
layerrule = blur on, match:namespace ags-notification-center
layerrule = blur on, match:namespace ags-wifi-popover
layerrule = blur on, match:namespace ags-bar-popover
layerrule = blur on, match:namespace ags-osd
layerrule = blur on, match:namespace ags-dock
layerrule = blur on, match:namespace ags-cheatsheet
layerrule = blur on, match:namespace ags-session
layerrule = blur on, match:namespace ags-desktop-widgets
layerrule = blur on, match:namespace ags-theme-switcher
layerrule = blur on, match:namespace ags-applauncher

# Alpha thresholds — lower = blur more transparent areas
layerrule = ignore_alpha 0.2, match:namespace ags-bar
layerrule = ignore_alpha 0.2, match:namespace ags-notification
layerrule = ignore_alpha 0.2, match:namespace ags-notification-center
layerrule = ignore_alpha 0.2, match:namespace ags-wifi-popover
layerrule = ignore_alpha 0.2, match:namespace ags-bar-popover
layerrule = ignore_alpha 0.2, match:namespace ags-osd
layerrule = ignore_alpha 0.2, match:namespace ags-session
layerrule = ignore_alpha 0.2, match:namespace ags-theme-switcher
layerrule = ignore_alpha 0.3, match:namespace ags-dock
layerrule = ignore_alpha 0.2, match:namespace ags-desktop-widgets
layerrule = ignore_alpha 0.2, match:namespace ags-applauncher

# Disable xray so layers blur properly against windows
layerrule = xray off, match:namespace ags-bar
layerrule = xray off, match:namespace ags-wifi-popover
layerrule = xray off, match:namespace ags-bar-popover
layerrule = xray off, match:namespace ags-desktop-widgets
layerrule = xray off, match:namespace ags-theme-switcher
layerrule = xray off, match:namespace ags-applauncher

# Keep backward compatibility
layerrule = blur on, match:namespace gtk-layer-shell
layerrule = ignore_alpha 0.3, match:namespace gtk-layer-shell
# Layers Rules End #

windowrule = float on, match:class ^(org\.telegram\.desktop)$
windowrule = size 1330 815, match:class ^(org\.telegram\.desktop)$

windowrule = workspace 10 silent, match:class ^(vesktop)$
windowrule = workspace 9 silent, match:class ^(Spotify)$

# Additional window rules
windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0


# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Lexicon Shell Overlay                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
windowrule = float on, match:class ^([Ll]exicon-frontend)$
windowrule = fullscreen on, match:class ^([Ll]exicon-frontend)$
windowrule = pin on, match:class ^([Ll]exicon-frontend)$
windowrule = border_size 0, match:class ^([Ll]exicon-frontend)$
windowrule = no_shadow on, match:class ^([Ll]exicon-frontend)$
windowrule = no_anim on, match:class ^([Ll]exicon-frontend)$
windowrule = opacity 0.85 override 0.85 override, match:class ^([Ll]exicon-frontend)$
windowrule = rounding 0, match:class ^([Ll]exicon-frontend)$
windowrule = xray on, match:class ^([Ll]exicon-frontend)$
# Lexicon Shell Overlay End #
