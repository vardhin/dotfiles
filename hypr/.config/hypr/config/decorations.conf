# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃              Frozen Winter Decorations Configuration        ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# General configuration with animated rainbow borders
general {
    border_size = 1
    col.active_border = rgba(00bfffff) rgba(0080ffff) rgba(4da6ffff) rgba(80d4ffff) rgba(b3e5fcff) rgba(e1f5feff) 45deg
    col.inactive_border = rgba(1a365daa) rgba(2c5282aa) rgba(3182ceaa) 90deg
    gaps_in = 10
    gaps_out = 18
    gaps_workspaces = 50
}

decoration {
    active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 1.0
    rounding = 16
    
    # Icy glass blur effect — clean frosted glass
    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.17
        vibrancy_darkness = 0.1
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        special = true
        popups = true
        popups_ignorealpha = 0.2
        ignore_opacity = false
    }

    # Breathing ice-blue shadows
    shadow {
        enabled = yes
        range = 60
        render_power = 6
        offset = 8 8
        color = rgba(00bfff80)
        color_inactive = rgba(1e3a8a50)
        scale = 1.2
    }
    
    # Winter dimming effect
    dim_inactive = true
    dim_strength = 0.25
    dim_special = 0.5
    dim_around = 0.65
}

# Frozen animations with breathing effects
animations {
    enabled = true
    
    # Winter-themed bezier curves
    bezier = glacialFlow, 0.25, 0.46, 0.45, 0.94
    bezier = crystalGrow, 0.34, 1.4, 0.64, 1
    bezier = winterBreeze, 0.17, 0.84, 0.44, 1.5
    bezier = frostBite, 0.68, -0.55, 0.265, 1.55
    bezier = breathing, 0.37, 0, 0.63, 1
    bezier = linear, 0, 0, 1, 1
    
    # Frozen fading effects
    animation = fadeOut, 1, 5, crystalGrow
    animation = fadeShadow, 1, 12, breathing
    animation = fadeDim, 1, 8, glacialFlow
    animation = layersIn, 1, 10, winterBreeze, fadeShadow
    animation = layersOut, 1, 10, frostBite, fadeShadow
    animation = windowsIn, 1, 10, crystalGrow, popin
    animation = windowsOut, 1, 10, frostBite, popin
    animation = border, 1, 15, breathing
    animation = borderangle, 1, 20, breathing, loop
    animation = workspaces, 1, 5, breathing, slidefade
}

# Winter wonderland effects
misc {
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    always_follow_on_dnd = true
    layers_hog_keyboard_focus = true
    focus_on_activate = true
    enable_swallow = true
    swallow_regex = ^(kitty|alacritty|foot)$
}

